version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw Telegram messages from data lake."
    tables:
      - name: telegram_messages
        description: "Landing table for all scraped messages."
        columns:
          - name: message_id
            description: "Unique Telegram message ID."
          - name: channel_name
            description: "Telegram channel display name."
          - name: message_date
            description: "When the message was posted."
          - name: message_text
            description: "Full text of the message."
          - name: has_media
            description: "Whether message has media."
          - name: image_path
            description: "Path to downloaded image."
          - name: views
            description: "View count."
          - name: forwards
            description: "Forward count."
      - name: yolo_detections
        description: "Raw YOLO object detection results from images."
        columns:
          - name: message_id
            description: "Telegram message ID the image belongs to."
          - name: detected_class
            description: "Object class detected by YOLO."
          - name: confidence_score
            description: "Detection confidence (0-1)."
          - name: image_category
            description: "Derived category: promotional, product_display, lifestyle, other."
